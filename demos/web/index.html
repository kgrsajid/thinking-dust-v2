<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thinking Dust</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#fcfcfd;--surface:#fff;--surface-2:#f7f7f8;--surface-3:#f0f0f2;
--text:#08080a;--text-2:#52525b;--text-3:#a1a1aa;
--indigo:#4f46e5;--violet:#7c3aed;--emerald:#059669;--rose:#e11d48;
--border:#e4e4e7;--border-2:#d4d4d8;
--r:14px;--r-sm:8px;
--font:-apple-system,BlinkMacSystemFont,'Inter','SF Pro Display',system-ui,sans-serif;
--mono:'SF Mono','Fira Code',ui-monospace,monospace;
--shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
--shadow-lg:0 4px 24px rgba(0,0,0,.08);
}
html{font-size:15px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;border:none;outline:none;background:none}
::selection{background:#c7d2fe}

/* ── LAYOUT ──────────────────────────── */
.app{display:grid;grid-template-columns:380px 1fr;height:100vh;overflow:hidden}
@media(max-width:900px){.app{grid-template-columns:1fr;height:auto;min-height:100vh}}

/* ── SIDEBAR ─────────────────────────── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:24px 28px 20px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.logo-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--indigo),var(--violet));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-.02em}
.logo-sub{font-size:12px;color:var(--text-3);margin-left:38px;margin-top:-2px}

.sidebar-body{flex:1;overflow-y:auto;padding:20px 28px}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin-bottom:10px;margin-top:24px}
.section-label:first-child{margin-top:0}

/* ── INPUT ───────────────────────────── */
.input-wrap{position:relative;margin-bottom:12px}
.input-wrap textarea,.input-wrap input{width:100%;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--text);transition:.15s}
.input-wrap textarea{min-height:56px;max-height:120px;resize:vertical;line-height:1.5}
.input-wrap textarea:focus,.input-wrap input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.1);background:var(--surface)}
.input-wrap input{height:42px}
.input-wrap .hint{font-size:11px;color:var(--text-3);margin-top:4px;padding-left:2px}

/* ── BUTTONS ─────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{background:#1a1a2e;transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface-2);border-color:var(--border-2)}
.btn-row{display:flex;gap:8px;margin-top:4px}

/* ── PRESETS ─────────────────────────── */
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:5px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;color:var(--text-2);transition:.15s}
.chip:hover{border-color:var(--indigo);color:var(--indigo);background:#eef2ff}

/* ── LOG ─────────────────────────────── */
.log{font-family:var(--mono);font-size:12px;line-height:1.8;max-height:240px;overflow-y:auto}
.log:empty::before{content:'Teach me something.';font-family:var(--font);font-size:13px;color:var(--text-3);font-style:italic}
.log-row{padding:3px 0;opacity:0;animation:slideUp .25s forwards}
@keyframes slideUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.tag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:1px 6px;border-radius:3px;margin-right:6px;vertical-align:1px}
.tag.teach{background:#dbeafe;color:#2563eb}
.tag.derive{background:#d1fae5;color:#059669}
.tag.ask{background:#ede9fe;color:#7c3aed}
.tag.err{background:#fee2e2;color:#dc2626}
.log .txt{color:var(--text)}
.log .green{color:var(--emerald);font-weight:600}
.log .arrow{color:var(--text-3)}

/* ── MAIN ────────────────────────────── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.main-header{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.main-title{font-size:14px;font-weight:600;color:var(--text-2)}
.main-stats{display:flex;gap:20px}
.main-stat{font-size:12px;color:var(--text-3)}
.main-stat b{color:var(--text);font-weight:700}

/* ── CANVAS ──────────────────────────── */
.canvas-wrap{flex:1;position:relative;overflow:hidden}
#graph{position:absolute;top:0;left:0;width:100%;height:100%}
.canvas-overlay{position:absolute;top:16px;left:16px;pointer-events:none}
.canvas-overlay h2{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em}
.legend{position:absolute;bottom:16px;right:16px;display:flex;gap:16px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);padding:8px 14px;border-radius:var(--r-sm);border:1px solid var(--border);font-size:11px;color:var(--text-2);pointer-events:none}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:0}

/* ── PROOF TRACE ─────────────────────── */
.proof{position:absolute;bottom:16px;left:16px;right:120px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow);display:none}
.proof.show{display:block;animation:slideUp .3s}
.proof-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--emerald);margin-bottom:6px}
.proof-chain{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.proof-node{padding:3px 10px;background:var(--text);color:#fff;border-radius:4px;font-size:12px;font-weight:600;opacity:0;transform:scale(.8);animation:pop .25s forwards}
@keyframes pop{to{opacity:1;transform:scale(1)}}
.proof-rel{font-size:11px;color:var(--text-3);padding:0 2px;opacity:0;animation:fade .15s forwards}
@keyframes fade{to{opacity:1}}

/* ── STATUS ──────────────────────────── */
.status{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500;margin-top:6px}
.status.hidden{display:none}
.status.info{background:#eef2ff;color:var(--indigo)}
.status.ok{background:#ecfdf5;color:var(--emerald)}
.status.err{background:#fef2f2;color:var(--rose)}
.spinner{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SCROLLBAR ───────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
</style>
</head>
<body>
<div class="app">

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-mark">✦</div>
            <div class="logo-text">Thinking Dust</div>
        </div>
        <div class="logo-sub">It derives what it was never taught.</div>
    </div>

    <div class="sidebar-body">
        <!-- TEACH -->
        <div class="section-label">Teach</div>
        <div class="presets">
            <button class="chip" onclick="preset('geo')">Geography</button>
            <button class="chip" onclick="preset('security')">Security</button>
            <button class="chip" onclick="preset('bio')">Biology</button>
        </div>
        <div class="input-wrap">
            <textarea id="teach-input" placeholder="Paris is the capital of France" rows="2"></textarea>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" id="teach-btn" onclick="teach()">Teach</button>
            <button class="btn btn-ghost" onclick="teachRel()">+ Property</button>
        </div>
        <div id="teach-status" class="status hidden"></div>

        <!-- ASK -->
        <div class="section-label">Ask</div>
        <div class="presets">
            <button class="chip" onclick="askPreset('paris_eu')">Is Paris in Europe?</button>
            <button class="chip" onclick="askPreset('capital')">Capital of France?</button>
        </div>
        <div class="input-wrap">
            <input id="ask-input" placeholder="Is Paris in Europe?" type="text">
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" id="ask-btn" onclick="ask()">Ask</button>
        </div>
        <div id="ask-status" class="status hidden"></div>

        <!-- LOG -->
        <div class="section-label">Activity</div>
        <div class="log" id="log"></div>
    </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main class="main">
    <div class="main-header">
        <div class="main-title">Knowledge Graph</div>
        <div class="main-stats">
            <span class="main-stat"><b id="stat-nodes">0</b> nodes</span>
            <span class="main-stat"><b id="stat-edges">0</b> edges</span>
            <span class="main-stat"><b id="stat-derived">0</b> derived</span>
        </div>
    </div>
    <div class="canvas-wrap">
        <canvas id="graph"></canvas>
        <div class="canvas-overlay">
            <h2>Live Graph</h2>
        </div>
        <div class="legend">
            <span><span class="legend-dot" style="background:#4f46e5"></span>Taught</span>
            <span><span class="legend-dot" style="background:#059669"></span>Derived</span>
        </div>
        <div class="proof" id="proof">
            <div class="proof-label">✓ Derived — never taught this</div>
            <div class="proof-chain" id="proof-chain"></div>
        </div>
    </div>
</main>

</div>

<!-- Puter.js for future LLM integration -->
<script src="https://js.puter.com/v2/"></script>
<script>
const API = '';
let stats = { nodes: 0, edges: 0, derived: 0 };

/* ── API CALLS ──────────────────────────── */
async function api(path, body) {
    const res = await fetch(`${API}/api/${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
    });
    return res.json();
}

async function apiGet(path) {
    const res = await fetch(`${API}/api/${path}`);
    return res.json();
}

/* ── TEACH ──────────────────────────────── */
async function teach() {
    const input = document.getElementById('teach-input');
    const text = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('teach-btn');
    btn.disabled = true;
    setStatus('teach-status', 'info', '<span class="spinner"></span> Teaching...');

    try {
        const r = await api('teach', { text });
        if (r.error) { setStatus('teach-status', 'err', '✕ ' + r.error); return; }
        setStatus('teach-status', 'ok', '✓ Stored');
        log('teach', `<span class="txt">${esc(text)}</span>`);
        input.value = '';
        refreshGraph();
    } catch (e) {
        setStatus('teach-status', 'err', '✕ ' + e.message);
    } finally {
        btn.disabled = false;
        setTimeout(() => clearStatus('teach-status'), 2000);
    }
}

async function teachRel() {
    const name = prompt('Relation name? (e.g. north_of)');
    if (!name) return;
    const prop = prompt('Property? (transitive / symmetric / functional)');
    if (!prop) return;

    try {
        const r = await api('teach_relation', { name, property: prop });
        if (r.error) { setStatus('teach-status', 'err', '✕ ' + r.error); return; }
        setStatus('teach-status', 'ok', `✓ ${name} → ${prop}`);
        log('teach', `<span class="txt">${esc(name)} is ${esc(prop)}</span>`);
    } catch (e) {
        setStatus('teach-status', 'err', '✕ ' + e.message);
    }
}

/* ── ASK ────────────────────────────────── */
async function ask() {
    const input = document.getElementById('ask-input');
    const text = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('ask-btn');
    btn.disabled = true;
    setStatus('ask-status', 'info', '<span class="spinner"></span> Thinking...');
    document.getElementById('proof').classList.remove('show');

    try {
        const r = await api('ask', { text });
        if (r.error) { setStatus('ask-status', 'err', '✕ ' + r.error); return; }

        if (r.type === 'unknown' || r.type === 'None') {
            setStatus('ask-status', 'info', "I don't know — teach me more");
            log('ask', `<span class="txt">${esc(text)}</span> <span class="arrow">→</span> <span style="color:var(--text-3)">unknown</span>`);
        } else {
            const conf = r.confidence ? ` (${Math.round(r.confidence * 100)}%)` : '';
            setStatus('ask-status', 'ok', '✓ ' + r.answer + conf);
            log('ask', `<span class="txt">${esc(text)}</span> <span class="arrow">→</span> <span class="green">${esc(r.answer)}</span>`);

            // Show proof trace if available
            if (r.answer && r.answer.includes('→')) {
                showProof(r.answer);
            }
        }
        input.value = '';
    } catch (e) {
        setStatus('ask-status', 'err', '✕ ' + e.message);
    } finally {
        btn.disabled = false;
        setTimeout(() => clearStatus('ask-status'), 4000);
    }
}

/* ── GRAPH ──────────────────────────────── */
let nodes = [], edges = [], nodeMap = {};
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');

function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width * 2;
    canvas.height = r.height * 2;
    canvas.style.width = r.width + 'px';
    canvas.style.height = r.height + 'px';
    ctx.setTransform(2, 0, 0, 2, 0, 0);
}
window.addEventListener('resize', resize);
resize();

async function refreshGraph() {
    try {
        const data = await apiGet('kg');
        nodes = data.nodes || [];
        edges = data.edges || [];
        nodeMap = {};
        const w = canvas.width / 2, h = canvas.height / 2;
        nodes.forEach((n, i) => {
            nodeMap[n.id] = n;
            const angle = (i / nodes.length) * Math.PI * 2;
            n.x = w / 2 + Math.cos(angle) * 150;
            n.y = h / 2 + Math.sin(angle) * 100;
            n.vx = 0; n.vy = 0;
            n.radius = 26;
            n.pulse = 1;
            n.color = n.derived ? '#059669' : '#4f46e5';
        });

        stats.nodes = nodes.length;
        stats.edges = edges.length;
        stats.derived = edges.filter(e => e.derived).length;
        updateStats();
    } catch (e) { console.error(e); }
}

function physics() {
    const w = canvas.width / 2, h = canvas.height / 2;
    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i+1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            let dx = b.x - a.x, dy = b.y - a.y;
            let d = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
            let f = 3000 / (d * d);
            a.vx -= dx/d * f * 0.01;
            a.vy -= dy/d * f * 0.01;
            b.vx += dx/d * f * 0.01;
            b.vy += dy/d * f * 0.01;
        }
    }
    // Springs
    for (const e of edges) {
        const a = nodeMap[e.source], b = nodeMap[e.target];
        if (!a || !b) continue;
        let dx = b.x - a.x, dy = b.y - a.y;
        let d = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
        let f = (d - 140) * 0.004;
        a.vx += dx/d * f; a.vy += dy/d * f;
        b.vx -= dx/d * f; b.vy -= dy/d * f;
    }
    // Center + damping
    for (const n of nodes) {
        n.vx += (w/2 - n.x) * 0.0008;
        n.vy += (h/2 - n.y) * 0.0008;
        n.vx *= 0.85; n.vy *= 0.85;
        n.x += n.vx; n.y += n.vy;
        n.x = Math.max(40, Math.min(w-40, n.x));
        n.y = Math.max(40, Math.min(h-40, n.y));
        if (n.pulse > 0) n.pulse -= 0.015;
    }
}

function render() {
    const w = canvas.width/2, h = canvas.height/2;
    ctx.clearRect(0, 0, w, h);
    physics();

    // Edges
    for (const e of edges) {
        const a = nodeMap[e.source], b = nodeMap[e.target];
        if (!a || !b) continue;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = e.derived ? 'rgba(5,150,105,.35)' : 'rgba(0,0,0,.08)';
        ctx.lineWidth = e.derived ? 2 : 1;
        if (e.derived) ctx.setLineDash([5,3]); else ctx.setLineDash([]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Label
        const mx = (a.x+b.x)/2, my=(a.y+b.y)/2;
        ctx.font = '10px -apple-system, sans-serif';
        ctx.fillStyle = '#a1a1aa';
        ctx.textAlign = 'center';
        ctx.fillText(e.label, mx, my-4);
    }

    // Nodes
    for (const n of nodes) {
        const r = n.radius + n.pulse * 10;
        // Glow
        if (n.pulse > 0) {
            const g = ctx.createRadialGradient(n.x,n.y,r,n.x,n.y,r+20);
            g.addColorStop(0, n.derived?'rgba(5,150,105,.2)':'rgba(79,70,229,.2)');
            g.addColorStop(1,'transparent');
            ctx.beginPath(); ctx.arc(n.x,n.y,r+20,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
        }
        // Circle
        ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
        ctx.fillStyle = n.color; ctx.fill();
        // Text
        ctx.font = '600 11px -apple-system, sans-serif';
        ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
        const words = n.label.split(' ');
        if (words.length > 2) {
            ctx.fillText(words.slice(0,2).join(' '), n.x, n.y-6);
            ctx.fillText(words.slice(2).join(' '), n.x, n.y+7);
        } else if (words.length === 2 && words[0].length + words[1].length > 10) {
            ctx.fillText(words[0], n.x, n.y-6);
            ctx.fillText(words[1], n.x, n.y+7);
        } else {
            ctx.fillText(n.label, n.x, n.y);
        }
    }
    requestAnimationFrame(render);
}

/* ── PROOF TRACE ────────────────────────── */
function showProof(answer) {
    const el = document.getElementById('proof');
    const chain = document.getElementById('proof-chain');
    chain.innerHTML = '';

    // Parse "X → Y → Z" from answer
    const parts = answer.split('→').map(s => s.trim());
    if (parts.length < 2) return;

    parts.forEach((p, i) => {
        setTimeout(() => {
            const node = document.createElement('span');
            node.className = 'proof-node';
            node.textContent = p;
            chain.appendChild(node);
            if (i < parts.length - 1) {
                setTimeout(() => {
                    const rel = document.createElement('span');
                    rel.className = 'proof-rel';
                    rel.textContent = '→';
                    chain.appendChild(rel);
                }, 80);
            }
        }, i * 200);
    });

    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 6000);
}

/* ── HELPERS ────────────────────────────── */
function setStatus(id, type, html) {
    const el = document.getElementById(id);
    el.className = `status ${type}`;
    el.innerHTML = html;
}
function clearStatus(id) { document.getElementById(id).className = 'status hidden'; }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function log(type, html) {
    const el = document.getElementById('log');
    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = `<span class="tag ${type}">${type}</span>${html}`;
    el.appendChild(row);
    el.scrollTop = el.scrollHeight;
}
function updateStats() {
    document.getElementById('stat-nodes').textContent = stats.nodes;
    document.getElementById('stat-edges').textContent = stats.edges;
    document.getElementById('stat-derived').textContent = stats.derived;
}

/* ── PRESETS ────────────────────────────── */
const PRESETS = {
    geo: [
        "Paris is the capital of France",
        "France is in the EU",
        "EU is part of Europe",
        "Berlin is the capital of Germany",
        "Germany is in the EU",
    ],
    security: [
        "SQL Injection is a code injection attack",
        "SQL Injection exploits input validation",
        "parameterized queries prevents SQL Injection",
        "XSS is a code injection attack",
        "XSS exploits input validation",
        "output encoding prevents XSS",
    ],
    bio: [
        "DNA is part of genes",
        "genes are part of chromosomes",
        "chromosomes are part of the nucleus",
        "the nucleus is part of the cell",
    ],
};

async function preset(name) {
    const facts = PRESETS[name];
    if (!facts) return;
    for (const f of facts) {
        await api('teach', { text: f });
        log('teach', `<span class="txt">${esc(f)}</span>`);
    }
    refreshGraph();
}

function askPreset(name) {
    const q = {
        paris_eu: "Is Paris in Europe?",
        capital: "What is the capital of France?",
    }[name];
    if (q) {
        document.getElementById('ask-input').value = q;
        ask();
    }
}

/* ── ENTER KEYS ─────────────────────────── */
document.getElementById('teach-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); teach(); }
});
document.getElementById('ask-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') ask();
});
